<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Console</title>
  <link rel="stylesheet" href="/static/portal/site.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Search Console</a>
    <nav class="account">
      {% if request.user.is_authenticated %}
        <span>{{ request.user.username }}</span>
        <span class="badge">{{ plan.label }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">退出</button>
        </form>
      {% else %}
        <span class="badge">{{ plan.label }}</span>
        <a href="{% url 'login' %}">登录</a>
      {% endif %}
      <a href="/admin/">后台</a>
    </nav>
  </header>

  <main class="shell">
    <section class="search-panel">
      <form method="get" class="search-form" id="search-form">
        <input name="q" value="{{ keyword }}" placeholder="输入关键词" autofocus>
        <button type="submit" id="search-button">搜索</button>
      </form>
      <p class="hint">当前支持多个来源聚合搜索，结果会按来源轮询合并展示。</p>
      <div class="loading-panel" id="loading-panel" aria-live="polite">
        <div class="loading-row">
          <span id="loading-text">正在搜索</span>
          <span class="loading-time" id="loading-time">0s</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>
    </section>

    <div class="alert is-hidden" id="search-error"></div>

    <section class="summary is-hidden" id="results-summary">
        <div>
          <span class="label">关键词</span>
          <strong id="summary-keyword"></strong>
        </div>
        <div>
          <span class="label">结果</span>
          <strong id="summary-count"></strong>
        </div>
        <div>
          <span class="label">来源</span>
          <strong id="summary-sources"></strong>
        </div>
    </section>

    <section class="results" id="results-list">
    </section>
  </main>
  <script src="/static/portal/search.js?v=20260625c" defer></script>
</body>
</html>
